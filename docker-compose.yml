services:
  mock_services:
    build:
      context: .
      dockerfile: Dockerfile.light
    command: uvicorn mock_services.app:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/services')"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile.rag
    command: sh -c "python -m scripts.index_runbooks && uvicorn mcp_server.server:mcp.streamable_http_app --factory --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    environment:
      - MOCK_SERVICES_URL=http://mock_services:8002
    depends_on:
      mock_services:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), timeout=3).close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  chat_api:
    build:
      context: .
      dockerfile: Dockerfile.light
    command: uvicorn chat.api:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - MCP_SERVER_URL=http://mcp_server:8001
    depends_on:
      mcp_server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "8000:3000"
    environment:
      - CHAT_API_URL=http://chat_api:8003
    depends_on:
      chat_api:
        condition: service_healthy
