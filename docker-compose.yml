services:
  mock_services:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn mock_services.app:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/services"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m mcp_server.server
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - MOCK_SERVICES_URL=http://mock_services:8002
    depends_on:
      mock_services:
        condition: service_healthy

  chat:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run chat/app.py --server.port 8000 --server.address 0.0.0.0
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MCP_SERVER_URL=http://mcp_server:8001
    depends_on:
      - mcp_server
